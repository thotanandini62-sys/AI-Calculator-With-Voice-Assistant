<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Scientific Calculator with Voice</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .pulse-animation {
            animation: pulse-ring 1.5s ease-in-out infinite;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function VoiceScientificCalculator() {
            const [display, setDisplay] = useState('0');
            const [memory, setMemory] = useState(0);
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [transcript, setTranscript] = useState('');
            const [response, setResponse] = useState('');
            const recognitionRef = useRef(null);

            // Initialize speech recognition
            useEffect(() => {
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    recognitionRef.current = new SpeechRecognition();
                    recognitionRef.current.continuous = false;
                    recognitionRef.current.interimResults = false;
                    recognitionRef.current.lang = 'en-US';

                    recognitionRef.current.onresult = async (event) => {
                        const speechResult = event.results[0][0].transcript;
                        setTranscript(speechResult);
                        setIsListening(false);
                        await processVoiceCommand(speechResult);
                    };

                    recognitionRef.current.onerror = (event) => {
                        console.error('Speech recognition error:', event.error);
                        setIsListening(false);
                        setResponse('Sorry, I couldn\'t hear that. Please try again.');
                    };

                    recognitionRef.current.onend = () => {
                        setIsListening(false);
                    };
                }
            }, []);

            const processVoiceCommand = async (command) => {
                setIsProcessing(true);
                const result = parseVoiceCommand(command);
                
                if (result) {
                    setDisplay(result.result);
                    addToHistory(${command} = ${result.result});
                    setResponse(result.explanation);
                    speak(result.explanation);
                } else {
                    setResponse('I can help with math calculations. Try saying operations like add, subtract, multiply, divide, square root, or power.');
                    speak('I can help with math. Try saying numbers with operations like add, subtract, multiply, or divide.');
                }
                
                setIsProcessing(false);
            };

            const parseVoiceCommand = (command) => {
                const lower = command.toLowerCase();
                const numbers = lower.match(/\d+\.?\d*/g);
                
                if (!numbers || numbers.length === 0) return null;

                // Addition
                if (lower.includes('plus') || lower.includes('add')) {
                    const result = numbers.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
                    return { result: String(result), explanation: ${numbers.join(' plus ')} equals ${result} };
                }
                
                // Subtraction
                if (lower.includes('minus') || lower.includes('subtract')) {
                    const result = parseFloat(numbers[0]) - parseFloat(numbers[1] || 0);
                    return { result: String(result), explanation: ${numbers[0]} minus ${numbers[1]} equals ${result} };
                }
                
                // Multiplication
                if (lower.includes('times') || lower.includes('multiply') || lower.includes('multiplied')) {
                    const result = numbers.reduce((a, b) => parseFloat(a) * parseFloat(b), 1);
                    return { result: String(result), explanation: ${numbers.join(' times ')} equals ${result} };
                }
                
                // Division
                if (lower.includes('divided') || lower.includes('divide')) {
                    const result = parseFloat(numbers[0]) / parseFloat(numbers[1] || 1);
                    return { result: String(result), explanation: ${numbers[0]} divided by ${numbers[1]} equals ${result} };
                }
                
                // Square root
                if (lower.includes('square root')) {
                    const result = Math.sqrt(parseFloat(numbers[0]));
                    return { result: String(result), explanation: Square root of ${numbers[0]} is ${result} };
                }
                
                // Cube root
                if (lower.includes('cube root')) {
                    const result = Math.cbrt(parseFloat(numbers[0]));
                    return { result: String(result), explanation: Cube root of ${numbers[0]} is ${result} };
                }
                
                // Square
                if (lower.includes('squared') || lower.includes('square')) {
                    const result = Math.pow(parseFloat(numbers[0]), 2);
                    return { result: String(result), explanation: ${numbers[0]} squared is ${result} };
                }
                
                // Cube
                if (lower.includes('cubed') || lower.includes('cube')) {
                    const result = Math.pow(parseFloat(numbers[0]), 3);
                    return { result: String(result), explanation: ${numbers[0]} cubed is ${result} };
                }
                
                // Power
                if (lower.includes('power') || lower.includes('to the')) {
                    const result = Math.pow(parseFloat(numbers[0]), parseFloat(numbers[1]));
                    return { result: String(result), explanation: ${numbers[0]} to the power of ${numbers[1]} is ${result} };
                }
                
                // Reciprocal
                if (lower.includes('reciprocal') || lower.includes('one over')) {
                    const result = 1 / parseFloat(numbers[0]);
                    return { result: String(result), explanation: Reciprocal of ${numbers[0]} is ${result} };
                }
                
                // Percentage
                if (lower.includes('percent')) {
                    const result = parseFloat(numbers[0]) / 100;
                    return { result: String(result), explanation: ${numbers[0]} percent is ${result} };
                }
                
                return null;
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.9;
                    utterance.pitch = 1;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const startListening = () => {
                if (recognitionRef.current) {
                    setTranscript('');
                    setResponse('');
                    setIsListening(true);
                    recognitionRef.current.start();
                } else {
                    alert('Speech recognition is not supported in your browser. Please use Chrome, Edge, or Safari.');
                }
            };

            // Calculator button handlers
            const handleNumber = (num) => {
                if (display === '0' || display === 'Error') {
                    setDisplay(num);
                } else {
                    setDisplay(display + num);
                }
            };

            const handleOperator = (op) => {
                if (display === 'Error') return;
                const lastChar = display.slice(-1);
                if (['+', '-', '×', '÷', '^'].includes(lastChar)) {
                    setDisplay(display.slice(0, -1) + op);
                } else {
                    setDisplay(display + op);
                }
            };

            const handleDecimal = () => {
                if (display === 'Error') return;
                const parts = display.split(/[\+\-×÷\^]/);
                const lastPart = parts[parts.length - 1];
                if (!lastPart.includes('.')) {
                    setDisplay(display + '.');
                }
            };

            const handleClear = () => {
                setDisplay('0');
            };

            const handleBackspace = () => {
                if (display.length > 1 && display !== 'Error') {
                    setDisplay(display.slice(0, -1));
                } else {
                    setDisplay('0');
                }
            };

            const handleSquareRoot = () => {
                try {
                    const result = Math.sqrt(parseFloat(display));
                    addToHistory(√${display} = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const handleCubeRoot = () => {
                try {
                    const result = Math.cbrt(parseFloat(display));
                    addToHistory(∛${display} = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const handleNthRoot = () => {
                setDisplay(display + '√');
            };

            const handleSquare = () => {
                try {
                    const num = parseFloat(display);
                    const result = num * num;
                    addToHistory(${display}² = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const handleCube = () => {
                try {
                    const num = parseFloat(display);
                    const result = num * num * num;
                    addToHistory(${display}³ = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const handlePower = () => {
                setDisplay(display + '^');
            };

            const handlePercent = () => {
                try {
                    const result = parseFloat(display) / 100;
                    addToHistory(${display}% = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const handleReciprocal = () => {
                try {
                    const result = 1 / parseFloat(display);
                    addToHistory(1/${display} = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const handlePlusMinus = () => {
                try {
                    const num = parseFloat(display);
                    setDisplay(String(-num));
                } catch {
                    setDisplay('Error');
                }
            };

            const handlePi = () => {
                if (display === '0' || display === 'Error') {
                    setDisplay(String(Math.PI));
                } else {
                    setDisplay(display + String(Math.PI));
                }
            };

            const handleE = () => {
                if (display === '0' || display === 'Error') {
                    setDisplay(String(Math.E));
                } else {
                    setDisplay(display + String(Math.E));
                }
            };

            const calculate = () => {
                try {
                    let expression = display;
                    
                    // Handle nth root
                    expression = expression.replace(/(\d+\.?\d*)√(\d+\.?\d*)/g, (match, base, root) => {
                        return String(Math.pow(parseFloat(base), 1/parseFloat(root)));
                    });
                    
                    // Handle power
                    expression = expression.replace(/(\d+\.?\d*)\^(\d+\.?\d*)/g, (match, base, exp) => {
                        return String(Math.pow(parseFloat(base), parseFloat(exp)));
                    });
                    
                    expression = expression.replace(/×/g, '*').replace(/÷/g, '/');
                    const result = eval(expression);
                    addToHistory(${display} = ${result});
                    setDisplay(String(result));
                } catch {
                    setDisplay('Error');
                }
            };

            const addToHistory = (entry) => {
                setHistory(prev => [entry, ...prev].slice(0, 20));
            };

            // Memory functions
            const handleMemoryClear = () => setMemory(0);
            const handleMemoryRecall = () => setDisplay(String(memory));
            const handleMemoryAdd = () => {
                try {
                    setMemory(memory + parseFloat(display));
                } catch {}
            };
            const handleMemorySubtract = () => {
                try {
                    setMemory(memory - parseFloat(display));
                } catch {}
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="flex gap-4 max-w-6xl w-full">
                        {/* Main Calculator */}
                        <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-3xl shadow-2xl p-8 flex-1">
                            <h1 className="text-3xl font-bold text-center mb-6 bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 bg-clip-text text-transparent">
                                🎙️ AI Scientific Calculator
                            </h1>

                            {/* Display */}
                            <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-6 mb-6 shadow-inner border border-slate-700">
                                <div className="text-right text-5xl font-bold text-cyan-400 break-all min-h-[60px] flex items-center justify-end">
                                    {display}
                                </div>
                                {memory !== 0 && (
                                    <div className="text-right text-sm text-purple-400 mt-2">
                                        Memory: {memory}
                                    </div>
                                )}
                            </div>

                            {/* Voice Section */}
                            <div className="mb-6">
                                <div className="flex justify-center mb-4">
                                    <button
                                        onClick={startListening}
                                        disabled={isListening || isProcessing}
                                        className={`${
                                            isListening 
                                                ? 'bg-red-500 pulse-animation' 
                                                : 'bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700'
                                        } text-white rounded-full p-6 shadow-lg transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed`}
                                    >
                                        {isListening ? (
                                            <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M7 4a3 3 0 016 0v6a3 3 0 11-6 0V4z"/>
                                                <path d="M5.5 9.643a.75.75 0 00-1.5 0V10c0 3.06 2.29 5.585 5.25 5.954V17.5h-1.5a.75.75 0 000 1.5h4.5a.75.75 0 000-1.5h-1.5v-1.546A6.001 6.001 0 0016 10v-.357a.75.75 0 00-1.5 0V10a4.5 4.5 0 01-9 0v-.357z"/>
                                            </svg>
                                        ) : isProcessing ? (
                                            <svg className="animate-spin w-8 h-8" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                        ) : (
                                            <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 20 20">
                                                <path d="M7 4a3 3 0 016 0v6a3 3 0 11-6 0V4z"/>
                                                <path d="M5.5 9.643a.75.75 0 00-1.5 0V10c0 3.06 2.29 5.585 5.25 5.954V17.5h-1.5a.75.75 0 000 1.5h4.5a.75.75 0 000-1.5h-1.5v-1.546A6.001 6.001 0 0016 10v-.357a.75.75 0 00-1.5 0V10a4.5 4.5 0 01-9 0v-.357z"/>
                                            </svg>
                                        )}
                                    </button>
                                </div>

                                {/* Voice Feedback */}
                                {(transcript || response) && (
                                    <div className="p-4 bg-gradient-to-r from-blue-900/50 to-purple-900/50 rounded-xl border border-blue-500/30 fade-in">
                                        {transcript && (
                                            <p className="text-sm text-blue-200 mb-2">
                                                <span className="font-semibold">🎤 You said:</span> "{transcript}"
                                            </p>
                                        )}
                                        {response && (
                                            <p className="text-sm text-purple-200 font-medium">
                                                <span className="font-semibold">🤖 Result:</span> {response}
                                            </p>
                                        )}
                                    </div>
                                )}
                            </div>

                            {/* Memory & Special Functions */}
                            <div className="grid grid-cols-5 gap-2 mb-3">
                                <button onClick={handleMemoryClear} className="bg-gradient-to-r from-red-600 to-red-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    MC
                                </button>
                                <button onClick={handleMemoryRecall} className="bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    MR
                                </button>
                                <button onClick={handleMemoryAdd} className="bg-gradient-to-r from-green-600 to-green-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    M+
                                </button>
                                <button onClick={handleMemorySubtract} className="bg-gradient-to-r from-yellow-600 to-yellow-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    M-
                                </button>
                                <button onClick={() => setShowHistory(!showHistory)} className="bg-gradient-to-r from-purple-600 to-purple-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    📜
                                </button>
                            </div>

                            {/* Scientific Functions Row 1 */}
                            <div className="grid grid-cols-5 gap-2 mb-2">
                                <button onClick={handleSquareRoot} className="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    √x
                                </button>
                                <button onClick={handleCubeRoot} className="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    ∛x
                                </button>
                                <button onClick={handleNthRoot} className="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    x√y
                                </button>
                                <button onClick={handleSquare} className="bg-gradient-to-r from-violet-600 to-violet-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    x²
                                </button>
                                <button onClick={handleCube} className="bg-gradient-to-r from-violet-600 to-violet-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    x³
                                </button>
                            </div>

                            {/* Scientific Functions Row 2 */}
                            <div className="grid grid-cols-5 gap-2 mb-3">
                                <button onClick={handlePower} className="bg-gradient-to-r from-violet-600 to-violet-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    x^y
                                </button>
                                <button onClick={handleReciprocal} className="bg-gradient-to-r from-pink-600 to-pink-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    1/x
                                </button>
                                <button onClick={handlePercent} className="bg-gradient-to-r from-pink-600 to-pink-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    %
                                </button>
                                <button onClick={handlePi} className="bg-gradient-to-r from-cyan-600 to-cyan-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    π
                                </button>
                                <button onClick={handleE} className="bg-gradient-to-r from-cyan-600 to-cyan-700 text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all text-sm">
                                    e
                                </button>
                            </div>

                            {/* Main Calculator Buttons */}
                            <div className="grid grid-cols-4 gap-2">
                                <button onClick={handleClear} className="bg-gradient-to-r from-red-500 to-red-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all">
                                    C
                                </button>
                                <button onClick={handleBackspace} className="bg-gradient-to-r from-orange-500 to-orange-600 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all">
                                    ⌫
                                </button>
                                <button onClick={handlePlusMinus} className="bg-gradient-to-r from-slate-600 to-slate-700 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all">
                                    ±
                                </button>
                                <button onClick={() => handleOperator('÷')} className="bg-gradient-to-r from-amber-500 to-amber-600 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    ÷
                                </button>

                                <button onClick={() => handleNumber('7')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    7
                                </button>
                                <button onClick={() => handleNumber('8')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    8
                                </button>
                                <button onClick={() => handleNumber('9')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    9
                                </button>
                                <button onClick={() => handleOperator('×')} className="bg-gradient-to-r from-amber-500 to-amber-600 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    ×
                                </button>

                                <button onClick={() => handleNumber('4')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    4
                                </button>
                                <button onClick={() => handleNumber('5')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    5
                                </button>
                                <button onClick={() => handleNumber('6')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    6
                                </button>
                                <button onClick={() => handleOperator('-')} className="bg-gradient-to-r from-amber-500 to-amber-600 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    −
                                </button>

                                <button onClick={() => handleNumber('1')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    1
                                </button>
                                <button onClick={() => handleNumber('2')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    2
                                </button>
                                <button onClick={() => handleNumber('3')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    3
                                </button>
                                <button onClick={() => handleOperator('+')} className="bg-gradient-to-r from-amber-500 to-amber-600 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    +
                                </button>

                                <button onClick={() => handleNumber('0')} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all col-span-2">
                                    0
                                </button>
                                <button onClick={handleDecimal} className="bg-gradient-to-br from-slate-700 to-slate-800 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    .
                                </button>
                                <button onClick={calculate} className="bg-gradient-to-r from-green-500 to-emerald-600 text-white py-4 rounded-xl font-bold text-xl hover:shadow-lg transition-all">
                                    =
                                </button>
                            </div>

                            {/* Voice Commands Guide */}
                            <div className="mt-4 p-4 bg-slate-800/50 rounded-xl border border-cyan-500/30">
                                <h3 className="text-cyan-400 font-semibold mb-2 text-sm">🎤 Voice Commands:</h3>
                                <div className="text-xs text-slate-300 space-y-1">
                                    <p>• "25 plus 37" • "100 minus 45" • "12 times 8" • "144 divided by 12"</p>
                                    <p>• "square root of 144" • "cube root of 27" • "5 squared" • "2 cubed"</p>
                                    <p>• "3 to the power of 4" • "reciprocal of 5" • "25 percent"</p>
                                </div>
                            </div>
                        </div>

                        {/* History Panel */}
                        {showHistory && (
                            <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-3xl shadow-2xl p-6 w-80 slide-in">
                                <h2 className="text-xl font-bold text-cyan-400 mb-4">📊 History</h2>
                                {history.length === 0 ? (
                                    <p className="text-slate-400 text-sm">No calculations yet</p>
                                ) : (
                                    <div className="space-y-2 max-h-[700px] overflow-y-auto">
                                        {history.map((entry, idx) => (
                                            <div key={idx} className="bg-slate-800 p-3 rounded-lg text-sm text-slate-300 border border-slate-700 hover:border-cyan-500/50 transition-all">
                                                {entry}
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <button 
                                    onClick={() => setHistory([])} 
                                    className="mt-4 w-full bg-gradient-to-r from-red-600 to-red-700 text-white py-2 rounded-lg font-semibold hover:shadow-lg transition-all"
                                >
                                    Clear All
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<VoiceScientificCalculator />, document.getElementById('root'));
    </script>
</body>
</html>
